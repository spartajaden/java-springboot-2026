<!doctype html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: layout(~{::content}, ~{::pageScripts})}"
>
  <div th:fragment="content" class="container my-3">
    <h3>мҠӨн„°л””нҸ¬мҠӨнҠё мғҒм„ё</h3>

    <table class="table table-bordered">
      <thead class="table-dark">
        <tr>
          <th colspan="2" class="text-center">мғҒм„ё</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <th style="width: 150px">лІҲнҳё</th>
          <td th:text="${post.postId}"></td>
        </tr>
        <tr>
          <th>м№ҙн…Ңкі лҰ¬</th>
          <td th:text="${post.categoryName}"></td>
        </tr>
        <!-- <tr>
          <th>м ңлӘ©</th>
          <td th:text="${post.title}"></td>
        </tr> -->
        <tr>
          <th>мһ‘м„ұмһҗ</th>
          <td th:text="${post.writerName}"></td>
        </tr>
        <tr>
          <th>лӘЁм§‘мқёмӣҗ</th>
          <td th:text="${post.maxMembers}"></td>
        </tr>
        <tr>
          <th>мЎ°нҡҢмҲҳ</th>
          <td th:text="${post.viewCount}"></td>
        </tr>
        <tr>
          <th>мһ‘м„ұмқј</th>
          <td
            th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"
          ></td>
        </tr>
        <tr>
          <th>лӮҙмҡ©</th>
          <td>
            <div th:utext="${post.content}"></div>
          </td>
        </tr>
      </tbody>
    </table>

    <div class="text-end">
      <a
        th:if="${session.loginUser != null and session.loginUser.userId == post.userId}"
        th:href="@{|/studypost/edit/${post.postId}|}"
        class="btn btn-sm btn-primary"
      >
        <i class="bi bi-pencil-square"></i> мҲҳм •
      </a>

      <form
        th:if="${session.loginUser != null and (session.loginUser.userId == post.userId or session.loginUser.role == 'ROLE_ADMIN')}"
        th:action="@{|/studypost/delete/${post.postId}|}"
        method="post"
        style="display: inline"
        onsubmit="return confirm('м •л§җ мӮӯм ңн•ҳмӢңкІ мҠөлӢҲк№Ң?');"
      >
        <button
          type="submit"
          class="btn btn-sm btn-danger"
          th:if="${session.loginUser != null and (session.loginUser.userId == post.userId or session.loginUser.role == 'ROLE_ADMIN')}"
        >
          <i class="bi bi-trash-fill"></i> мӮӯм ң
        </button>
      </form>
      <a th:href="@{/studypost/list}" class="btn btn-sm btn-success">
        <i class="bi bi-list"></i> лӘ©лЎқ
      </a>
    </div>

    <hr />

    <h4>лҢ“кёҖ</h4>

    <div th:if="${#lists.isEmpty(commentList)}" class="text-muted">
      м•„м§Ғ лҢ“кёҖмқҙ м—ҶмҠөлӢҲлӢӨ.
    </div>

    <!-- лҢ“кёҖ лҰ¬мҠӨнҠё-->
    <div th:each="comment : ${commentList}" class="border rounded p-2 mb-2">
      <div class="d-flex justify-content-between">
        <div>
          <strong th:text="${comment.content}"></strong>
          <span th:text="${comment.content}"></span>
          <small
            class="text-muted"
            th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}"
          ></small>

          <form
            th:if="${session.loginUser != null and (session.loginUser.userId == comment.userId or session.loginUser.role == 'ROLE_ADMIN')}"
            th:action="@{|/comment/delete/${comment.commentId}|}"
            method="post"
            onsubmit="return confirm('лҢ“кёҖмқ„ мӮӯм ңн•ҳмӢңкІ мҠөлӢҲк№Ң?');"
            style="display: inline"
          >
            <button type="submit" class="btn btn-sm btn-danger">
              <i class=""></i>мӮӯм ң</button>
          </form>
        </div>
      </div>
    </div>
    <!-- лҢ“кёҖмһ‘м„ұ-->
    <h5>лҢ“кёҖ мһ‘м„ұ</h5>
    <form
      th:action="@{/comment/create}"
      th:object="${commentForm}"
      method="post"
    >
      <input type="hidden" th:field="*{postId}" />

      <div class="mb-2">
        <textarea
          id="content"
          th:field="*{content}"
          class="form-control"
          rows="1"
        ></textarea>
      </div>

      <div
        class="error alert alert-danger"
        th:if="${#fields.hasErrors('content')}"
        th:errors="*{content}"
      ></div>

      <div class="text-end">
        <button type="submit" class="btn btn-sm btn-primary">
          <i class="bi bi-floppy">
          лҢ“кёҖ л“ұлЎқ</button>
      </div>
    </form>

    <!-- мҠӨн„°л”” мӢ мІӯ лҰ¬мҠӨнҠё / кёҖ мһ‘м„ұмһҗл§Ң ліј мҲҳ мһҲлҸ„лЎқ -->
    <hr />
    <div>
      <h4>мӢ мІӯмһҗ лӘ©лЎқ</h4>

      <div th:if="${#lists.size(applicationList) == 0}">
        м•„м§Ғ мӢ мІӯмһҗк°Җ м—ҶмҠөлӢҲлӢӨ.
      </div>

      <!-- applicationмқҖ thymeleafмқҳ мҳҲм•Ҫм–ҙ(Keyword) -->
      <div th:each="apply : ${applicationList}" class="border rounded p-2 mb-2">
        <div>
          <strong th:text="${apply.applicantName}"></strong>
          <span class="badge bg-secondary" th:text="${apply.status}"></span>
        </div>
        <div class="mt-2" th:text="${apply.message}"></div>

        <div class="mt-2">
          <!-- мҠ№мқё л°Ҹ кұ°м Ҳ лІ„нҠјмҳҒм—ӯ-->
          <form
            th:if="${apply.status == 'PENDING'}"
            th:action="@{|/application/approve/${apply.applicationId}}"
            method="post"
            style="display: inline"
          >
            <button
              th:if="${session.loginUser != null and (session.loginUser.userId == post.userId or session.loginUser.role == 'ROLE_ADMIN')}"
              type="submit"
              class="btn btn-sm btn-success"
            >
              <i class="bi-hand-thumbs-up-fill"></i> мҠ№мқё
            </button>
          </form>

          <form
            th:if="${apply.status == 'PENDING'}"
            th:action="@{|/application/reject/${apply.applicationId}}"
            method="post"
            style="display: inline"
          >
            <button
              th:if="${session.loginUser != null and (session.loginUser.userId == post.userId or session.loginUser.role == 'ROLE_ADMIN')}"
              type="submit"
              class="btn btn-sm btn-danger"
            >
              <i class="hand-thumbs-down-fill"></i> кұ°м Ҳ
            </button>
          </form>
        </div>
      </div>
    </div>

    <!-- мҠӨн„°л”” мӢ мІӯ мҳҒм—ӯ -->
    <h4>мҠӨн„°л”” мӢ мІӯ</h4>
    <div
      th:if="${session.loginUser != null and session.loginUser.userId != post.userId}"
    >
      <form
        th:action="@{/application/create}"
        th:object="${studyApplicationForm}"
        method="post"
      >
        <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
          <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
        </div>

        <input type="hidden" th:field="*{postId}" />

        <div class="mb-2">
          <textarea
            id="message"
            th:field="*{message}"
            class="form-control"
            rows="1"
            placeholder="мӢ мІӯл©”мӢңм§ҖлҘј мһ…л Ҙн•ҳм„ёмҡ”"
          ></textarea>
        </div>

        <div
          class="error alert alert-danger"
          th:if="${#fields.hasErrors('message')}"
          th:errors="*{message}"
        ></div>

        <div class="text-end">
          <button type="submit" class="btn btn-sm btn-warning">
            <i class="bi bi-send-fill"></i>мӢ мІӯ</button>
        </div>
      </form>
    </div>

    <div
      th:if="${session.loginUser != null and session.loginUser.userId == post.userId}"
    >
      ліёмқё нҸ¬мҠӨнҠём—җлҠ” мӢ мІӯн•  мҲҳ м—ҶмҠөлӢҲлӢӨ.
    </div>
  </div>

  <script th:fragment="pageScripts"></script>
</html>
