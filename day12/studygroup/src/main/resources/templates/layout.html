<!doctype html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  th:fragment="layout(content, pageScripts)"
  data-bs-theme="auto"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#712cf9" />

    <title>StudyGroup</title>

    <!-- 방법 1 : 다운로드 방식 -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- 방법 2 : CDN(Content Delivery Network) 방법 -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" th:href="@{/css/studygroup.css}" />
    <!-- carousel용 css-->
    <link rel="stylesheet" th:href="@{css/carousel.css}" />
    <!-- Trumbowyg용 css -->
    <link
      rel="stylesheet"
      type="text/css"
      th:href="@{/trumbowyg/ui/trumbowyg.min.css}"
    />
    <script th:src="@{/js/color-modes.js}"></script>
  </head>
  <body>
    <div
      class="dropdown position-fixed bottom-0 end-0 mb-3 me-3 bd-mode-toggle"
    >
      <button
        class="btn btn-bd-primary py-2 dropdown-toggle d-flex align-items-center"
        id="bd-theme"
        type="button"
        aria-expanded="false"
        data-bs-toggle="dropdown"
        aria-label="Toggle theme (auto)"
      >
        <svg class="bi my-1 theme-icon-active" aria-hidden="true">
          <use href="#circle-half"></use>
        </svg>
        <span class="visually-hidden" id="bd-theme-text">Toggle theme</span>
      </button>
      <ul
        class="dropdown-menu dropdown-menu-end shadow"
        aria-labelledby="bd-theme-text"
      >
        <li>
          <button
            type="button"
            class="dropdown-item d-flex align-items-center"
            data-bs-theme-value="light"
            aria-pressed="false"
          >
            <svg class="bi me-2 opacity-50" aria-hidden="true">
              <use href="#sun-fill"></use>
            </svg>
            Light
            <svg class="bi ms-auto d-none" aria-hidden="true">
              <use href="#check2"></use>
            </svg>
          </button>
        </li>
        <li>
          <button
            type="button"
            class="dropdown-item d-flex align-items-center"
            data-bs-theme-value="dark"
            aria-pressed="false"
          >
            <svg class="bi me-2 opacity-50" aria-hidden="true">
              <use href="#moon-stars-fill"></use>
            </svg>
            Dark
            <svg class="bi ms-auto d-none" aria-hidden="true">
              <use href="#check2"></use>
            </svg>
          </button>
        </li>
        <li>
          <button
            type="button"
            class="dropdown-item d-flex align-items-center active"
            data-bs-theme-value="auto"
            aria-pressed="true"
          >
            <svg class="bi me-2 opacity-50" aria-hidden="true">
              <use href="#circle-half"></use>
            </svg>
            Auto
            <svg class="bi ms-auto d-none" aria-hidden="true">
              <use href="#check2"></use>
            </svg>
          </button>
        </li>
      </ul>
    </div>
    <nav
      class="navbar navbar-expand-lg navbar-dark bg-dark"
      aria-label="Fifth navbar example"
    >
      <div class="container-fluid">
        <a class="navbar-brand" href="/">StudyMate</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarsExample05"
          aria-controls="navbarsExample05"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarsExample05">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" aria-current="page" href="/">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" th:href="@{/studypost/list}">StudyPost</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" th:href="@{/board/list}">Board</a>
            </li>
            <li class="nav-item" th:if="${session.loginUser == null}">
              <a class="nav-link" th:href="@{/user/join}">Join</a>
            </li>
            <li class="nav-item" th:if="${session.loginUser == null}">
              <a class="nav-link" th:href="@{/user/login}">Login</a>
            </li>
            <!-- 관리자의 경우만 카테고리 관리리스트 진입가능 -->
            <li class="nav-item" th:if="${session.loginUser != null and session.loginUser.role == 'ROLE_ADMIN'}">
              <a class="nav-link" th:href="@{/admin/categories}">Category</a>
            </li>
            <!-- <li class="nav-item">
              <a class="nav-link disabled" aria-disabled="true">Disabled</a>
            </li> -->
            <!-- <li class="nav-item dropdown">
              <a
              class="nav-link dropdown-toggle"
              href="#"
              data-bs-toggle="dropdown"
              aria-expanded="false"
              >Dropdown</a
              >
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#">Action</a></li>
                <li><a class="dropdown-item" href="#">Another action</a></li>
                <li>
                  <a class="dropdown-item" href="#">Something else here</a>
                </li>
              </ul>
            </li> -->
          </ul>
          <div th:unless="${session.loginUser == null}" class="text-end me-3 d-flex align-items-center">
            <span
              th:text="${session.loginUser.name} + '님 반갑습니다'"
              class="text-light me-2"
            ></span>
            <form
              th:action="@{/user/logout}"
              method="post"
              style="display: inline"
            >
              <button type="submit" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-escape"></i>
              </button>
            </form>
          </div>
          <!-- <form role="search">
            <input
              class="form-control"
              type="search"
              placeholder="Search"
              aria-label="Search"
            /> -->
          </form>
        </div>
      </div>
    </nav>
    <main th:replace="${content}"></main>

    <!-- <script th:src="@{/bootstrap-5.3.8-dist/js/bootstrap.min.js}"></script> -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <!-- trumbowyg 관련 링크 -->
    <!-- jQuery CDN 추가 -->
    <script
      src="https://code.jquery.com/jquery-3.7.1.min.js"
      integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
      crossorigin="anonymous"
    ></script>
    <script th:src="@{/trumbowyg/trumbowyg.min.js}"></script>
    <script th:src="@{/trumbowyg/trumbowyg.pasteimage.js}"></script>
    <script th:src="@{/trumbowyg/langs/ko.min.js}"></script>

    <!-- 페이지 개별 스크립트는 맨 마지막 -->
    <script th:replace="${pageScripts} ?: ~{}"></script>
  </body>
</html>
