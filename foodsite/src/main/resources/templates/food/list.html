<!DOCTYPE html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>오늘 뭐 먹었지?</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> 
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">🍴 오늘 뭐 먹지? 기록장</h2>
        <a th:href="@{/food/add}" class="btn btn-primary">+ 새 기록</a>
      </div>

      <div class="card border-sm mb-4">
        <div class="card-body">
          <form th:action="@{/food/list}" method="get" class="row g-2">
            <div class="col-md-3">
              <select name="category" class="form-select">
                <option value="">전체 카테고리</option>
                <option value="한식" th:selected="${category == '한식'}">한식</option>
                <option value="일식" th:selected="${category == '일식'}">일식</option>
                <option value="중식" th:selected="${category == '중식'}">중식</option>
                <option value="양식" th:selected="${category == '양식'}">양식</option>
                <option value="기타" th:selected="${category == '기타'}">기타</option>
              </select>
            </div>

            <div class="col-md-7">
              <input type="text"
                name="keyword"
                th:value="${keyword}"
                class="form-control" />
            </div>

            <div class="col-md-2 d-grid">
              <button class="btn btn-dark">검색</button>
            </div>
          </form>
        </div>
      </div>

    <div class="row">
      <div class="col">
        <table class="table">
          <thead class="table-dark">
            <tr>
              <th class="text-center">📅 날짜</th>
              <th class="text-center">🍽️ 음식</th>
              <th class="text-center">⭐ 별점</th>
              <th class="text-center">관리</th>
            </tr>
          </thead>

          <tbody>
            <tr th:each="food : ${pageResponse.content}">
              <td class="text-center" th:text="${food.eatDate}"></td>
              <td class="text-center">
                <span class="fw-bold" th:text="${food.name}"></span>
                <span class="badge badge text-bg-info"
                      th:text="${food.category}"></span>
              </td>

              <td class="text-center">
                <span th:each="i : ${#numbers.sequence(1, food.rating)}">⭐</span>
                <span class="text-muted small ms-1"
                        th:text="'(' + ${food.rating} + ')'"></span>
              </td>

              <td class="text-center">
                <a th:href="@{/food/edit/{id}(id=${food.id})}"
                   class="btn btn-sm btn-primary me-1">
                  수정
                </a>
                <!-- ✅ 삭제 버튼: <a> → <form>으로 변경 -->
                <form th:action="@{/food/delete/{id}(id=${food.id})}"
                      method="post"
                      style="display:inline;"
                      onsubmit="return confirm('삭제할까요?')">
                  <button type="submit" class="btn btn-sm btn-danger">삭제</button>
                </form>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(pageResponse.content)}">
              <td colspan="4" class="text-center py-4 text-muted">
                😢 기록이 없습니다
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

   <div class="row">
      <div class="col-9">
      <nav>
        <ul class="pagination pagination-sm justify-content-center">
          <li class="page-item" th:if="${pageResponse.hasPrev}">
            <a class="page-link"
               th:href="@{/food/list(page=${pageResponse.startPage - 1}, category=${category}, keyword=${keyword})}"
            >◀</a>
          </li>
          <li class="page-item"
              th:each="pageNum : ${#numbers.sequence(pageResponse.startPage, pageResponse.endPage)}"
              th:classappend="${pageNum == pageResponse.currentPage} ? 'active'">
            <a class="page-link"
               th:href="@{/food/list(page=${pageNum},category=${category},keyword=${keyword})}"
               th:text="${pageNum}"
            ></a>
           </li>

            <li class="page-item" th:if="${pageResponse.hasNext}">
              <a class="page-link"
                 th:href="@{/food/list(page=${pageResponse.endPage + 1}, category=${category}, keyword=${keyword})}"
              >▶</a>
            </li>
          </ul>
        </nav>
     </div>
  </body>
</html>
