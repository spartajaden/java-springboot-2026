<!doctype html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: layout(~{::content})}"
>
  <div th:fragment="content" class="container my-3">
    <div class="row">
      <div class="col">
        <table class="table">
          <thead class="table-dark">
            <tr>
              <th>No.</th>
              <th>영화명</th>
              <th>장르</th>
              <th>개봉일</th>
              <th>영화시간</th>
              <th>평점</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="board, index : ${boardList}">
              <td th:text="${index.count}"></td>
              <td>
                <a
                  th:href="@{|/board/detail/${board.bno}|}"
                  th:text="${board.title}"
                ></a>
              </td>

              <!-- 장르 -->
              <td th:text="${board.genre}"></td>

              <!-- 개봉일 (날짜 포맷 적용) -->
              <td th:text="${board.releaseDate != null} ? 
                  ${#temporals.format(board.releaseDate, 'yyyy-MM-dd')} : ''"></td>

              <!-- 영화시간 -->
              <td th:text="${board.duration != null} ? 
                  ${board.duration + '분'} : ''"></td>

              <!-- 평점 -->
              <td th:text="${board.rating}"></td>
            </tr>
          </tbody>
        </table>

        <!-- 게시글쓰기 버튼 영역 -->
        <!-- btn-success 오타 수정 (success → btn-success) -->
        <div class="text-end">
          <a th:href="@{/board/create}" class="btn btn-sm btn-success">
            <i class="bi bi-pencil"></i> 글쓰기
          </a>
        </div>
      </div>
    </div>
  </div>
</html>
