<!DOCTYPE html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
>
  <head>
    <meta charset="UTF-8">
    <title>음식 기록하기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
          <div class="card">    
          <div class="card-body">
          <h3 class="card-title text-center mb-4">📝 오늘 뭐 먹었나요?</h3>
            <form th:action="@{/food/add}" th:object="${food}" method="post">

              <div class="mb-3">
                <label class="form-label">음식 이름</label>
                <input type="text" class="form-control"
                       th:field="*{name}" />
              </div>

              <div class="mb-3">
                <label class="form-label">카테고리</label>
                <select class="form-select" th:field="*{category}">
                  <option value="한식">한식</option>
                  <option value="일식">일식</option>
                  <option value="중식">중식</option>
                  <option value="양식">양식</option>
                  <option value="기타">기타</option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label">별점 (1~5)</label>
                <input type="number" class="form-control"
                       th:field="*{rating}" min="1" max="5" required />
              </div>

              <div class="mb-3">
                <label class="form-label">먹은 날짜</label>
                <input type="date" class="form-control"
                    th:field="*{eatDate}" required>
              </div>

              <div class="mb-3">
                <label class="form-label">메모</label>
                <textarea class="form-control"
                          th:field="*{memo}" rows="4"
                          placeholder="맛은 어땠나요?"></textarea>
              </div>

              <div class="d-flex justify-content-center gap-2">
                <button type="submit" class="btn btn-primary">
                  저장하기
                </button>
                <a th:href="@{/food/list}" class="btn btn-sm btn-warning">
                  취소하고 돌아가기
                </a>
              </div>
            </form>
          </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
